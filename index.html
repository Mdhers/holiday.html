<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador Vacaciones 2026</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800 font-sans pb-12 selection:bg-blue-100">

    <header class="sticky top-0 bg-white/80 backdrop-blur-md border-b border-slate-200 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex flex-col sm:flex-row items-center gap-4 w-full md:w-auto">
                <div class="flex items-center gap-3 w-full sm:w-auto">
                    <div class="p-2.5 bg-blue-600 rounded-xl text-white shadow-sm shadow-blue-200 shrink-0">
                        <i data-lucide="calendar"></i>
                    </div>
                    <div>
                        <h1 class="text-xl sm:text-2xl font-bold text-slate-900 leading-tight">Planificador 2026</h1>
                        <div class="flex items-center gap-2">
                            <span id="save-status" class="text-xs font-medium text-slate-400 flex items-center gap-1">
                                <i data-lucide="cloud" class="w-3 h-3"></i> Conectando...
                            </span>
                        </div>
                    </div>
                </div>
                
                <!-- Location Selector -->
                <div class="w-full sm:w-auto mt-2 sm:mt-0 sm:ml-4 border-l-0 sm:border-l sm:border-slate-200 sm:pl-6">
                    <label for="location-select" class="sr-only">Elegir calendario</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-slate-400">
                            <i data-lucide="map-pin" class="w-4 h-4"></i>
                        </div>
                        <select id="location-select" class="bg-slate-50 border border-slate-200 text-slate-700 text-sm rounded-xl focus:ring-blue-500 focus:border-blue-500 block w-full pl-9 p-2.5 outline-none font-medium hover:bg-slate-100 transition-colors appearance-none pr-10 cursor-pointer">
                            <option value="BCN">Barcelona (España)</option>
                            <option value="DC">Washington D.C. (US)</option>
                        </select>
                        <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-slate-400">
                            <i data-lucide="chevron-down" class="w-4 h-4"></i>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="flex items-center gap-4 w-full md:w-auto justify-between md:justify-end">
                <button 
                    id="clear-btn"
                    class="hidden items-center gap-1.5 text-sm font-semibold text-slate-500 hover:text-red-600 transition-colors px-2 py-1"
                >
                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                    <span>Limpiar</span>
                </button>
                <div class="bg-slate-900 text-white px-5 py-2.5 rounded-full flex items-center gap-3 shadow-lg hover:shadow-xl transition-shadow cursor-default shrink-0">
                    <span id="counter" class="text-2xl font-black tabular-nums">0</span>
                    <span class="text-sm font-medium leading-tight text-slate-300 border-l border-slate-700 pl-3">días<br/>tomados</span>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 mt-8">
        <!-- Interactive Legend -->
        <div class="bg-white rounded-2xl p-4 sm:p-5 shadow-sm border border-slate-200/60 flex flex-wrap justify-center gap-6 sm:gap-8 mb-8 text-sm font-medium text-slate-600">
            <div class="flex items-center gap-2.5">
                <div class="w-5 h-5 rounded-md border border-slate-200 bg-white"></div> 
                Laborable
            </div>
            <div class="flex items-center gap-2.5">
                <div class="w-5 h-5 rounded-md bg-slate-100 border border-slate-200/50"></div> 
                Fin de semana
            </div>
            <div class="flex items-center gap-2.5">
                <div class="w-5 h-5 rounded-md bg-red-50 border border-red-200 flex items-center justify-center">
                    <div class="w-1.5 h-1.5 rounded-full bg-red-500"></div>
                </div> 
                <span id="legend-holiday-text">Festivo</span>
            </div>
            <div class="flex items-center gap-2.5">
                <div class="w-5 h-5 rounded-md bg-blue-600 shadow-sm shadow-blue-200 ring-2 ring-blue-600 ring-offset-1"></div> 
                Seleccionado
            </div>
        </div>

        <!-- 12-Month Calendar Grid -->
        <div id="calendar-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Calendars injected by JS -->
        </div>

        <!-- Tip Section -->
        <div class="mt-8 bg-blue-50 text-blue-800 rounded-2xl p-4 flex gap-3 items-start border border-blue-100">
            <i data-lucide="info" class="shrink-0 mt-0.5 w-5 h-5"></i>
            <p class="text-sm font-medium leading-relaxed">
                <strong>Tip:</strong> Tus cambios se guardan automáticamente. Pasa el ratón sobre los días en rojo para ver qué festividad es. Cambia de ciudad arriba para ver las diferencias entre países y sumar días a tu plan general.
            </p>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Application State
        let selectedDays = new Set();
        let currentLocation = 'BCN';
        let isInitialLoad = true;

        // Holiday Data Base
        const holidayData = {
            "BCN": {
                label: "Festivo BCN",
                holidays: {
                    "2026-01-01": "Año Nuevo",
                    "2026-01-06": "Reyes Magos",
                    "2026-04-03": "Viernes Santo",
                    "2026-04-06": "Lunes de Pascua",
                    "2026-05-01": "Día del Trabajador",
                    "2026-05-25": "Segunda Pascua (Pascua Granada)",
                    "2026-06-24": "Sant Joan",
                    "2026-08-15": "La Asunción",
                    "2026-09-11": "La Diada",
                    "2026-09-24": "La Mercè",
                    "2026-10-12": "Fiesta Nacional de España",
                    "2026-11-01": "Todos los Santos",
                    "2026-12-06": "Día de la Constitución",
                    "2026-12-08": "Inmaculada Concepción",
                    "2026-12-25": "Navidad",
                    "2026-12-26": "Sant Esteve"
                }
            },
            "DC": {
                label: "Festivo D.C.",
                holidays: {
                    "2026-01-01": "New Year's Day",
                    "2026-01-19": "Martin Luther King Jr. Day",
                    "2026-02-16": "Washington's Birthday (Presidents' Day)",
                    "2026-04-16": "Emancipation Day",
                    "2026-05-25": "Memorial Day",
                    "2026-06-19": "Juneteenth",
                    "2026-07-03": "Independence Day (Observed)",
                    "2026-09-07": "Labor Day",
                    "2026-10-12": "Columbus Day",
                    "2026-11-11": "Veterans Day",
                    "2026-11-26": "Thanksgiving Day",
                    "2026-12-25": "Christmas Day"
                }
            }
        };

        const months = [
            "Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", 
            "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"
        ];
        const daysOfWeek = ['L', 'M', 'X', 'J', 'V', 'S', 'D'];

        // Core Calendar Logic
        const getDaysInMonth = (year, month) => new Date(year, month + 1, 0).getDate();
        const getFirstDayOfWeek = (year, month) => {
            let day = new Date(year, month, 1).getDay();
            return day === 0 ? 6 : day - 1; 
        };

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = ''; // Clear existing
            const year = 2026;
            const currentHolidays = holidayData[currentLocation].holidays;

            // Update Legend
            document.getElementById('legend-holiday-text').innerText = holidayData[currentLocation].label;

            months.forEach((monthName, monthIndex) => {
                const daysInMonth = getDaysInMonth(year, monthIndex);
                const firstDay = getFirstDayOfWeek(year, monthIndex);
                
                const monthDiv = document.createElement('div');
                monthDiv.className = "bg-white rounded-3xl p-5 shadow-sm border border-slate-200/60";
                
                let html = `
                    <h2 class="text-lg font-bold text-slate-800 mb-4 ml-1 capitalize tracking-wide">${monthName}</h2>
                    <div class="grid grid-cols-7 gap-1 text-center mb-3">
                        ${daysOfWeek.map(d => `<div class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">${d}</div>`).join('')}
                    </div>
                    <div class="grid grid-cols-7 gap-1.5">
                `;

                for(let i = 0; i < firstDay; i++) {
                    html += `<div class="aspect-square"></div>`;
                }

                for(let d = 1; d <= daysInMonth; d++) {
                    const dateStr = `${year}-${String(monthIndex + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    const isHoliday = !!currentHolidays[dateStr];
                    const holidayName = currentHolidays[dateStr] || '';
                    const dayOfWeek = new Date(year, monthIndex, d).getDay();
                    const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
                    
                    const title = isHoliday ? holidayName : isWeekend ? 'Fin de semana' : 'Laborable';

                    html += `
                        <button
                            data-date="${dateStr}"
                            data-holiday="${isHoliday}"
                            data-weekend="${isWeekend}"
                            title="${title}"
                            class="day-btn relative aspect-square w-full flex items-center justify-center rounded-xl text-sm font-semibold transition-all active:scale-90 border outline-none focus-visible:ring-2 focus-visible:ring-slate-400"
                        >
                            ${d}
                            ${isHoliday ? `<div class="red-dot absolute bottom-1 w-1 h-1 rounded-full bg-red-500"></div>` : ''}
                        </button>
                    `;
                }

                html += `</div>`;
                monthDiv.innerHTML = html;
                grid.appendChild(monthDiv);
            });

            updateUI();
            lucide.createIcons();
        }

        function updateUI() {
            document.getElementById('counter').innerText = selectedDays.size;
            
            const clearBtn = document.getElementById('clear-btn');
            if (selectedDays.size > 0) {
                clearBtn.classList.remove('hidden');
                clearBtn.classList.add('flex');
            } else {
                clearBtn.classList.add('hidden');
                clearBtn.classList.remove('flex');
            }

            document.querySelectorAll('.day-btn').forEach(btn => {
                const dateStr = btn.dataset.date;
                const isHoliday = btn.dataset.holiday === 'true';
                const isWeekend = btn.dataset.weekend === 'true';
                const isSelected = selectedDays.has(dateStr);
                const redDot = btn.querySelector('.red-dot');

                btn.className = "day-btn relative aspect-square w-full flex items-center justify-center rounded-xl text-sm font-semibold transition-all active:scale-90 border outline-none focus-visible:ring-2 focus-visible:ring-slate-400 ";

                if (isSelected) {
                    btn.className += "bg-blue-600 text-white border-blue-600 shadow-md ring-2 ring-blue-600 ring-offset-1 z-10 hover:bg-blue-700";
                    if (redDot) redDot.style.display = 'none';
                } else if (isHoliday) {
                    btn.className += "bg-red-50 text-red-700 border-red-200 hover:bg-red-100 hover:border-red-300";
                    if (redDot) redDot.style.display = 'block';
                } else if (isWeekend) {
                    btn.className += "bg-slate-100 text-slate-500 border-transparent hover:bg-slate-200 hover:text-slate-700";
                } else {
                    btn.className += "bg-white text-slate-700 border-slate-200 hover:border-blue-300 hover:bg-blue-50";
                }
            });
        }

        function toggleDay(dateStr) {
            if (selectedDays.has(dateStr)) {
                selectedDays.delete(dateStr);
            } else {
                selectedDays.add(dateStr);
            }
            updateUI();
            saveToCloud();
        }

        function clearDays() {
            selectedDays.clear();
            updateUI();
            saveToCloud();
        }

        // Event Listeners setup
        document.getElementById('calendar-grid').addEventListener('click', (e) => {
            const btn = e.target.closest('.day-btn');
            if (btn) {
                toggleDay(btn.dataset.date);
            }
        });

        document.getElementById('clear-btn').addEventListener('click', clearDays);
        
        document.getElementById('location-select').addEventListener('change', (e) => {
            currentLocation = e.target.value;
            renderCalendar();
            saveToCloud();
        });

        let db, auth, userId, appId;
        let isFirebaseActive = false;

        async function initCloudStorage() {
            try {
                const configStr = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
                appId = typeof __app_id !== 'undefined' ? __app_id : 'local-dev-id';
                
                if (!configStr) {
                    // Fallback if exported outside this environment
                    setSaveStatus('Modo local (Sin nube)', 'cloud-off');
                    renderCalendar();
                    return;
                }

                const app = initializeApp(JSON.parse(configStr));
                db = getFirestore(app);
                auth = getAuth(app);
                
                // Auth flow is mandatory
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
                
                userId = auth.currentUser.uid;
                isFirebaseActive = true;
                
                // Fetch data once, then listen for updates
                const docRef = doc(db, 'artifacts', appId, 'users', userId, 'planner_data', 'config');
                onSnapshot(docRef, (snapshot) => {
                    if (snapshot.exists()) {
                        const data = snapshot.data();
                        if (data.selectedDays) {
                            selectedDays = new Set(data.selectedDays);
                        }
                        if (data.location && holidayData[data.location]) {
                            currentLocation = data.location;
                            document.getElementById('location-select').value = currentLocation;
                        }
                    }
                    if (isInitialLoad) {
                        renderCalendar();
                        isInitialLoad = false;
                    } else {
                        updateUI();
                    }
                    setSaveStatus('Guardado en la nube', 'cloud-check');
                }, (error) => {
                    console.error("Sync error:", error);
                    if (isInitialLoad) renderCalendar();
                });

            } catch (error) {
                console.error("Cloud init failed, falling back to local.", error);
                setSaveStatus('Error de conexión', 'cloud-alert');
                renderCalendar();
            }
        }

        async function saveToCloud() {
            if (!isFirebaseActive || !userId) return;
            setSaveStatus('Guardando...', 'cloud-upload');
            
            try {
                const docRef = doc(db, 'artifacts', appId, 'users', userId, 'planner_data', 'config');
                await setDoc(docRef, {
                    selectedDays: Array.from(selectedDays),
                    location: currentLocation,
                    lastUpdated: new Date().toISOString()
                });
                setSaveStatus('Guardado', 'cloud-check');
            } catch (error) {
                console.error("Save failed:", error);
                setSaveStatus('Error al guardar', 'cloud-alert');
            }
        }

        function setSaveStatus(text, iconName) {
            const statusEl = document.getElementById('save-status');
            statusEl.innerHTML = `<i data-lucide="${iconName}" class="w-3 h-3"></i> ${text}`;
            lucide.createIcons();
        }

        // Start App
        document.addEventListener('DOMContentLoaded', () => {
            initCloudStorage();
        });
    </script>
</body>
</html>
